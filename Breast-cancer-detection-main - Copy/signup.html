<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Poppins","Segoe UI",sans-serif;
}

/* 🩺 BACKGROUND */
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
        url("./Assest/img45.jpg");
    background-size:cover;
    background-position:center;
    overflow:hidden;
}

/* ✨ BIG FLOATING MEDICAL EMOJIS */
.emoji{
    position:absolute;
    opacity:0.3;
    transform:translateY(120vh);
}

.emoji.animate{
    animation:float 10s linear infinite;
}

@keyframes float{
    from{ transform:translateY(120vh); }
    to{ transform:translateY(-20vh); }
}

/* 🧊 FROSTED GLASS SIGNUP CONTAINER */
.signup-container{
    max-width:500px;
    width:90%;
    padding:50px 60px;

    background:rgba(0,166,199,0.18);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);

    border-radius:26px;
    box-shadow:0 30px 70px rgba(0,0,0,0.6);

    text-align:center;
    color:#fff;
    animation:fadeIn 1s ease;
}

/* ✨ Animation */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* 🧠 Title */
h2{
    font-size:32px;
    font-weight:600;
    margin-bottom:10px;
}

.subtitle{
    font-size:16px;
    opacity:0.9;
    margin-bottom:30px;
}

/* 🧾 Inputs */
input{
    width:100%;
    padding:16px;
    margin:12px 0;

    border:none;
    border-radius:16px;

    font-size:16px;
    background:rgba(255,255,255,0.92);
}

input::placeholder{
    color:#555;
}

input:focus{
    outline:none;
    box-shadow:0 0 0 3px rgba(0,180,216,0.8);
}

/* 🔐 Button */
button{
    width:100%;
    padding:16px;
    margin-top:20px;

    border:none;
    border-radius:20px;

    background:linear-gradient(135deg,#00A6C7,#007C99);
    color:white;

    font-size:18px;
    font-weight:600;
    cursor:pointer;

    transition:all 0.3s ease;
}

button:hover{
    transform:translateY(-4px);
    box-shadow:0 15px 30px rgba(0,119,182,0.7);
}

button:active{
    transform:scale(0.97);
}

/* ❌ Error message */
.error{
    color:#ff6b6b;
    font-weight:500;
    margin-bottom:15px;
}

/* Signup link styling */
.signup-link a{
    color:#00b4d8;
    text-decoration:none;
}
.signup-link a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<!-- Floating emojis -->
<div class="emoji" style="left:10%; animation-delay:0s; font-size:100px;">🧬</div>
<div class="emoji" style="left:30%; animation-delay:2s; font-size:90px;">💊</div>
<div class="emoji" style="left:50%; animation-delay:4s; font-size:110px;">🩺</div>
<div class="emoji" style="left:70%; animation-delay:6s; font-size:100px;">🫀</div>
<div class="emoji" style="left:90%; animation-delay:8s; font-size:95px;">🧪</div>

<!-- Signup container -->
<div class="signup-container">

<h2>🩺 AI Breast Cancer Assistant</h2>
<p class="subtitle">Create your account to access diagnostics</p>

<!-- Flask/Django style signup form -->
<form method="post">
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Create Account</button>
</form>

<p class="signup-link" style="margin-top:20px;">Already have an account? <a href="/login">Login</a></p>

</div>

<!-- JS to trigger emoji animation -->
<script>
window.addEventListener('DOMContentLoaded', () => {
    const emojis = document.querySelectorAll('.emoji');
    emojis.forEach((emoji, index) => {
        setTimeout(() => {
            emoji.classList.add('animate');
        }, index * 100);
    });
});
</script>

</body>
</html>
